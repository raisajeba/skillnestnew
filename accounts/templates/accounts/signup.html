{% extends 'base.html' %}

{% block content %}

<div class="auth-card">

    <h2>
        Create Account
    </h2>

    <form method="POST">

        {% csrf_token %}
        {{ form.errors }}


        <p>
            Username <br>
            {{ form.username }}
        </p>

        <p>
            Password <br>
            {{ form.password1 }}
        </p>

        <p>
            Confirm Password <br>
            {{ form.password2 }}
        </p>

        <button type="submit">
            Sign Up
        </button>

    </form>

    <hr>

    <p>
        Already have an account?

        <a href="{% url 'login' %}">
            Login
        </a>
    </p>

</div>

{% endblock %}
