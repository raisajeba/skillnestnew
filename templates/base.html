{% load static %}

<!DOCTYPE html>
<html>
<head>

    <meta charset="UTF-8">

    <title>SkillNest</title>

    <link rel="stylesheet"
          href="{% static 'css/style.css' %}">

</head>


<body>



<nav class="navbar">

    <a
    href="{% url 'home' %}"
    class="logo">

        SkillNest

    </a>



    <div class="nav-links">

        <a href="{% url 'home' %}">
            Home
        </a>

        <a href="{% url 'index' %}">
            Skills
        </a>

        <a href="{% url 'profile' %}">
            Profile
        </a>

        <a href="{% url 'exchange_home' %}">
            Exchange
        </a>
            <a href="{% url 'ratings_home' %}">
        Ratings
        </a>


        {% if user.is_authenticated %}

           <form method="POST" action="{% url 'logout' %}" style="display:inline;">
               {% csrf_token %}
               <button type="submit" style="background:none;border:none;color:white;cursor:pointer;">
                  Logout
               </button>
           </form>

        {% else %}

            <a href="{% url 'login' %}">
                Login
            </a>
            <a href="{% url 'signup' %}">
                Signup
            </a>

        {% endif %}

    </div>

</nav>



<div class="container">

    {% block content %}
    {% endblock %}

</div>


</body>
</html>
